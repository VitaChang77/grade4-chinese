<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>四年級國語生字練習</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --red:#E8453C; --red-light:#FDECEA;
  --ink:#1A1A2E; --paper:#FFFDF7;
  --grid:#D4C9B0; --gold:#C8963E;
  --sage:#7A9E7E; --sage-light:#EDF4EE;
  --blue:#4A90D9; --blue-light:#EBF4FD;
  --purple:#9B59B6; --shadow:rgba(0,0,0,0.08);
}
body { background:var(--paper); font-family:'Noto Sans TC','微軟正黑體',sans-serif; min-height:100vh; overflow-x:hidden; }

header {
  background:var(--red); color:white;
  padding:14px 16px 10px;
  display:flex; align-items:center; gap:12px;
  position:sticky; top:0; z-index:200;
  box-shadow:0 2px 8px rgba(232,69,60,0.3);
}
.seal {
  width:44px; height:44px; background:white; border-radius:4px;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; color:var(--red); font-weight:900; letter-spacing:-2px; flex-shrink:0;
}
header h1 { font-size:18px; font-weight:700; line-height:1.2; }
header p  { font-size:11px; opacity:.85; margin-top:2px; }

.mode-nav { display:flex; background:white; border-bottom:2px solid var(--grid); }
.mode-btn {
  flex:1; padding:11px 4px; font-size:13px; font-weight:600;
  color:#999; cursor:pointer; border:none; background:none;
  border-bottom:3px solid transparent; font-family:inherit;
  transition:all .2s; display:flex; align-items:center; justify-content:center; gap:4px;
}
.mode-btn.active { color:var(--red); border-color:var(--red); }

.progress-wrap {
  background:white; padding:8px 14px;
  border-bottom:1px solid var(--grid);
  display:flex; align-items:center; gap:8px;
}
.progress-bar-bg { flex:1; height:7px; background:var(--grid); border-radius:4px; overflow:hidden; }
.progress-bar-fill {
  height:100%; background:linear-gradient(90deg,var(--sage),#5cb85c);
  border-radius:4px; transition:width .4s ease; width:0%;
}
.progress-text { font-size:11px; color:#999; white-space:nowrap; }

#modeWrite { display:block; }
#modeQuiz, #modeRadical { display:none; }

.lesson-tabs {
  display:flex; overflow-x:auto; background:white;
  border-bottom:1px solid var(--grid); padding:0 6px; gap:2px;
  scrollbar-width:none;
}
.lesson-tabs::-webkit-scrollbar { display:none; }
.ltab {
  flex-shrink:0; padding:8px 13px; font-size:13px; color:#888;
  cursor:pointer; border-bottom:3px solid transparent;
  white-space:nowrap; transition:all .2s; user-select:none;
}
.ltab.active { color:var(--red); border-color:var(--red); font-weight:700; }

.lesson-panel { display:none; padding:14px 10px 80px; }
.lesson-panel.active { display:block; }

.lesson-title {
  font-size:12px; color:var(--gold); font-weight:700; letter-spacing:2px;
  margin-bottom:10px; display:flex; align-items:center; gap:8px;
}
.lesson-title::after { content:''; flex:1; height:1px; background:var(--grid); }

.char-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(148px,1fr)); gap:10px; }
.char-card {
  background:white; border-radius:12px; border:1.5px solid var(--grid);
  overflow:hidden; box-shadow:0 2px 6px var(--shadow);
  cursor:pointer; transition:transform .15s; user-select:none;
}
.char-card:active { transform:scale(.97); }
.char-card.done { border-color:var(--sage); background:var(--sage-light); }
.card-top {
  display:flex; align-items:center; padding:9px 10px 7px; gap:8px;
  border-bottom:1px dashed var(--grid);
}
.char-display { font-size:40px; line-height:1; color:var(--ink); }
.char-info { flex:1; }
.char-zhuyin { font-size:12px; color:#999; }
.char-meta   { font-size:10px; color:#ccc; margin-top:2px; }
.done-mark {
  width:20px; height:20px; background:var(--sage); border-radius:50%;
  display:none; align-items:center; justify-content:center; color:white; font-size:12px;
}
.char-card.done .done-mark { display:flex; }

.practice-zone { padding:8px; background:#FAFAF7; display:none; }
.char-card.open .practice-zone { display:block; }

.canvas-wrap { position:relative; width:100%; aspect-ratio:1; max-width:190px; margin:0 auto; }
canvas.writing-canvas { position:absolute; top:0; left:0; width:100%; height:100%; touch-action:none; cursor:crosshair; border-radius:4px; }
canvas.grid-canvas    { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; border-radius:4px; }
.zone-btns { display:flex; gap:6px; margin-top:7px; justify-content:center; }
.btn-sm { padding:6px 14px; border:none; border-radius:20px; font-size:12px; cursor:pointer; font-family:inherit; font-weight:600; }
.btn-clear { background:#F0EDE6; color:#888; }
.btn-done  { background:var(--sage); color:white; }

/* ── Quiz Mode ── */
.quiz-container { padding:16px 14px 60px; max-width:600px; margin:0 auto; }

.quiz-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.quiz-counter { font-size:13px; color:#999; }
.quiz-score-badge { background:var(--blue-light); color:var(--blue); padding:3px 10px; border-radius:20px; font-size:12px; font-weight:700; }

.quiz-dots { display:flex; gap:6px; margin-bottom:20px; justify-content:center; flex-wrap:wrap; }
.q-dot { width:10px; height:10px; border-radius:50%; background:var(--grid); transition:background .3s; }
.q-dot.current { background:var(--blue); transform:scale(1.3); }
.q-dot.correct { background:var(--sage); }
.q-dot.wrong   { background:var(--red); }

.quiz-card {
  background:white; border-radius:16px; border:1.5px solid var(--grid);
  box-shadow:0 3px 12px var(--shadow); padding:20px 16px 16px; margin-bottom:14px;
}

/* ── Vocab hint display ── */
.vocab-hint-wrap {
  text-align:center; margin-bottom:10px;
}
.vocab-hint-label { font-size:12px; color:#bbb; margin-bottom:6px; }
.vocab-hint-word {
  font-size:36px; letter-spacing:6px; color:var(--ink);
  line-height:1.2; font-weight:400;
}
.vocab-hint-word .blank {
  color:var(--red); font-weight:700;
  border-bottom:2px solid var(--red);
  display:inline-block; min-width:1em;
}
.vocab-zhuyin { font-size:14px; color:var(--gold); letter-spacing:3px; margin-top:4px; }

.quiz-write-wrap {
  position:relative; width:min(200px,65vw); aspect-ratio:1; margin:10px auto 0;
}
.quiz-write-wrap canvas { position:absolute; top:0; left:0; width:100%; height:100%; }
.quiz-write-wrap canvas.qgrid  { pointer-events:none; border-radius:8px; }
.quiz-write-wrap canvas.qwrite { touch-action:none; cursor:crosshair; border-radius:8px; }

.quiz-action-row { display:flex; gap:8px; margin-top:12px; justify-content:center; }
.btn-quiz {
  padding:10px 22px; border:none; border-radius:24px;
  font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; transition:transform .1s;
}
.btn-quiz:active { transform:scale(.96); }
.btn-qclear     { background:#F0EDE6; color:#888; }
.btn-qself-pass { background:var(--sage); color:white; }
.btn-qself-fail { background:var(--red-light); color:var(--red); }
.btn-qstart     { background:var(--blue); color:white; flex:1; max-width:260px; }

.self-judge { display:none; margin-top:10px; background:var(--blue-light); border-radius:10px; padding:10px 12px; text-align:center; }
.self-judge.visible { display:block; }
.self-judge p { font-size:13px; color:var(--blue); margin-bottom:8px; font-weight:600; }
.judge-hint-char { font-size:40px; color:var(--ink); }
.judge-hint-word { font-size:20px; color:#666; margin:4px 0 2px; letter-spacing:4px; }
.judge-hint-sub  { font-size:11px; color:#aaa; margin-bottom:10px; }

/* Scope selector */
.scope-wrap { background:white; border-radius:12px; border:1.5px solid var(--grid); padding:14px; margin-bottom:14px; }
.scope-wrap h3 { font-size:14px; color:var(--ink); margin-bottom:10px; font-weight:700; }
.scope-checks { display:flex; flex-wrap:wrap; gap:8px; }
.scope-lbl {
  display:inline-flex; align-items:center; gap:5px;
  background:#F5F3EE; border-radius:20px; padding:8px 16px;
  cursor:pointer; font-size:14px; color:#666; user-select:none;
  border:1.5px solid transparent; transition:all .15s;
  -webkit-tap-highlight-color:rgba(0,0,0,0);
}
.scope-lbl.checked { background:var(--red-light); color:var(--red); border-color:var(--red); font-weight:700; }

.quiz-start-screen { text-align:center; padding:24px 16px; }
.quiz-start-screen .big-emoji { font-size:56px; margin-bottom:12px; }
.quiz-start-screen h2 { font-size:20px; color:var(--ink); margin-bottom:6px; font-weight:700; }
.quiz-start-screen p  { font-size:13px; color:#999; margin-bottom:20px; line-height:1.6; }

/* ── Radical Quiz ── */
.radical-quiz-wrap { padding:16px 14px 60px; max-width:600px; margin:0 auto; }
.rq-card { background:white; border-radius:16px; border:1.5px solid var(--grid); box-shadow:0 3px 12px var(--shadow); padding:22px 16px 16px; margin-bottom:14px; text-align:center; }
.rq-char  { font-size:80px; line-height:1.1; color:var(--ink); margin-bottom:4px; }
.rq-label { font-size:13px; color:#bbb; margin-bottom:16px; }
.radical-options { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:4px; }
.rad-opt { background:#F5F3EE; border:2px solid transparent; border-radius:12px; padding:14px 8px; font-size:28px; cursor:pointer; transition:all .15s; user-select:none; text-align:center; }
.rad-opt .opt-sub { font-size:11px; color:#aaa; margin-top:3px; }
.rad-opt:active { transform:scale(.96); }
.rad-opt.selected-correct { background:var(--sage-light); border-color:var(--sage); }
.rad-opt.selected-wrong   { background:var(--red-light);  border-color:var(--red); }
.rad-opt.reveal-correct   { background:var(--sage-light); border-color:var(--sage); }
.rq-feedback { height:28px; text-align:center; font-size:15px; font-weight:700; margin:8px 0; transition:opacity .3s; }
.rq-feedback.correct { color:var(--sage); }
.rq-feedback.wrong   { color:var(--red); }
.btn-rq-next { display:block; width:100%; max-width:260px; margin:0 auto; padding:12px; border:none; border-radius:24px; background:var(--blue); color:white; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }

/* ── Modal ── */
.modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.35); z-index:998; display:none; align-items:center; justify-content:center; }
.modal-overlay.visible { display:flex; }
.modal-box { background:white; border-radius:20px; padding:28px 32px; text-align:center; max-width:320px; width:90%; box-shadow:0 8px 32px rgba(0,0,0,.2); animation:popIn .3s ease; }
@keyframes popIn { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
.modal-box .m-emoji { font-size:52px; margin-bottom:8px; }
.modal-box h2 { font-size:21px; color:var(--red); margin-bottom:6px; }
.modal-box p  { color:#888; font-size:13px; line-height:1.6; margin-bottom:4px; }
.modal-box .m-score { font-size:32px; font-weight:900; color:var(--red); margin:8px 0; }
.modal-box .m-stars { font-size:28px; letter-spacing:4px; margin-bottom:12px; }
.modal-box .m-msg   { font-size:16px; font-weight:700; color:var(--ink); margin-bottom:4px; }
.modal-box .m-sub   { font-size:12px; color:#aaa; margin-bottom:16px; }
.btn-modal { padding:10px 28px; background:var(--red); color:white; border:none; border-radius:20px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; margin:4px; }
.btn-modal.secondary { background:#F0EDE6; color:#666; }

.confetti-overlay { position:fixed; top:0; left:0; right:0; bottom:0; pointer-events:none; z-index:999; display:none; }

@media(max-width:380px){
  .char-grid { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>

<header>
  <div class="seal">寫字</div>
  <div>
    <h1>四年級國語生字練習</h1>
    <p>手寫練習 · 隨機取題 · 部首考試</p>
  </div>
</header>

<div class="mode-nav">
  <button class="mode-btn active" onclick="switchMode('write')">✏️ 生字練習</button>
  <button class="mode-btn" onclick="switchMode('quiz')">🎯 隨機取題</button>
  <button class="mode-btn" onclick="switchMode('radical')">🔍 部首考試</button>
</div>

<div class="progress-wrap" id="progressWrap">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText">0 / 0</div>
</div>

<div id="modeWrite">
  <div class="lesson-tabs" id="lessonTabs"></div>
  <div id="lessonPanels"></div>
</div>
<div id="modeQuiz"><div class="quiz-container" id="quizContainer"></div></div>
<div id="modeRadical"><div class="radical-quiz-wrap" id="radicalContainer"></div></div>

<div class="modal-overlay" id="modalOverlay"><div class="modal-box" id="modalBox"></div></div>
<div class="confetti-overlay" id="confettiOverlay"></div>

/* ── vocab 解析：把 ① 換成 □（題目）或完整字（答案）── */
function renderVocabHint(vocabStr, char, zhuyin, showAnswer=false) {
  // ① = 答題字位置
  const parts = vocabStr.split('①');
  if (showAnswer) {
    return vocabStr.replace('①', `<span style="color:var(--sage)">${char}</span>`);
  }
  // 空白用注音提示
  const blankHtml = `<span class="blank">${zhuyin}</span>`;
  return parts[0] + blankHtml + parts[1];
}

function switchLesson(li){
  document.querySelectorAll('.ltab').forEach((t,i)=>t.classList.toggle('active',i===li));

function toggleCard(card){
  if(openCard&&openCard!==card)openCard.classList.remove('open');
  card.classList.toggle('open');
  openCard=card.classList.contains('open')?card:null;
  if(card.classList.contains('open')){
    const wrap=card.querySelector('.canvas-wrap');
    resizeCanvas(card.querySelector('.grid-canvas'),card.querySelector('.writing-canvas'),wrap);
    setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'nearest'}),50);

}
function markDone(card,key){
  card.classList.add('done');

/* canvas */
function setupCanvas(gridC,writeC,wrap){
  let drawing=false,lx=0,ly=0;
  function pos(e){const r=writeC.getBoundingClientRect();const s=e.touches?e.touches[0]:e;return[(s.clientX-r.left)*(writeC.width/r.width),(s.clientY-r.top)*(writeC.height/r.height)];}
  function stroke(e){const[x,y]=pos(e);const ctx=writeC.getContext('2d');ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(x,y);ctx.strokeStyle='#1A1A2E';ctx.lineWidth=4;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();[lx,ly]=[x,y];}
  writeC.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;[lx,ly]=pos(e);},{passive:false});
  writeC.addEventListener('touchmove', e=>{e.preventDefault();if(drawing)stroke(e);},{passive:false});
  writeC.addEventListener('touchend',  e=>{e.preventDefault();drawing=false;},{passive:false});
  writeC.addEventListener('mousedown', e=>{drawing=true;[lx,ly]=pos(e);});
  writeC.addEventListener('mousemove', e=>{if(drawing)stroke(e);});
  writeC.addEventListener('mouseup',   ()=>drawing=false);
  writeC.addEventListener('mouseleave',()=>drawing=false);
}
function resizeCanvas(gridC,writeC,wrap){
  const s=wrap.offsetWidth;if(!s)return;
  [gridC,writeC].forEach(c=>{c.width=s;c.height=s;});
  drawGrid(gridC);
}
function drawGrid(c){
  const ctx=c.getContext('2d'),s=c.width;
  ctx.clearRect(0,0,s,s);
  ctx.strokeStyle='#D4C9B0';ctx.lineWidth=1;
  ctx.strokeRect(.5,.5,s-1,s-1);
  ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(s/2,0);ctx.lineTo(s/2,s);ctx.moveTo(0,s/2);ctx.lineTo(s,s/2);ctx.stroke();
  ctx.setLineDash([]);
  ctx.strokeStyle='#EAD8C0';
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(s,s);ctx.moveTo(s,0);ctx.lineTo(0,s);ctx.stroke();
}

function renderRadQuestion(){
  const {questions,idx,score}=radState;
  const q=questions[idx];
  const allRads=[...new Set(ALL_CHARS.map(c=>c.radical))].filter(r=>r!==q.radical);
  const opts=shuffle([q.radical,...shuffle(allRads).slice(0,3)]);
  radState.answered=false;

  const dotsHtml=questions.map((_,i)=>{
    let cls='q-dot';
    if(i<idx) cls+=radState.results[i]?' correct':' wrong';
    else if(i===idx) cls+=' current';

      </div>

    <button class="btn-rq-next" id="rqNext" style="display:none" onclick="nextRadQuestion()">${idx+1<questions.length?'下一題 →':'查看成績 🏆'}</button>`;

function selectRadical(el,chosen,correct){
  if(radState.answered)return;
  radState.answered=true;
  const isCorrect=chosen===correct;
  document.querySelectorAll('.rad-opt').forEach(opt=>{opt.style.pointerEvents='none';if(opt.dataset.rad===correct)opt.classList.add('reveal-correct');});
  el.classList.add(isCorrect?'selected-correct':'selected-wrong');
  const fb=document.getElementById('rqFeedback');
  if(isCorrect){fb.textContent='✓ 答對了！🎉';fb.className='rq-feedback correct';radState.score++;}
  else{fb.textContent=`✗ 答錯了！正確答案是「${correct}」`;fb.className='rq-feedback wrong';}
  radState.results[radState.idx]=isCorrect;
  document.getElementById('rqNext').style.display='block';
}
function nextRadQuestion(){
  radState.idx++;
  if(radState.idx>=radState.questions.length) showRadResult();
  else renderRadQuestion();
}
function showRadResult(){
  const score=radState.score,total=radState.questions.length;
  const enc=ENCOURAGEMENTS.find(e=>score>=e.score)||ENCOURAGEMENTS[ENCOURAGEMENTS.length-1];

}

function showModal(html){document.getElementById('modalBox').innerHTML=html;document.getElementById('modalOverlay').classList.add('visible');}
function closeModal(){document.getElementById('modalOverlay').classList.remove('visible');document.getElementById('confettiOverlay').style.display='none';document.getElementById('confettiOverlay').innerHTML='';}
function launchConfetti(){
  const ov=document.getElementById('confettiOverlay');
  ov.style.display='block';ov.innerHTML='';
  const colors=['#E8453C','#C8963E','#7A9E7E','#4A90D9','#9B59B6'];
  for(let i=0;i<70;i++){
    const d=document.createElement('div');
    const color=colors[Math.floor(Math.random()*colors.length)];
    const sz=6+Math.random()*8;
    d.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;background:${color};border-radius:${Math.random()>.5?'50%':'2px'};left:${Math.random()*100}%;top:-10px;animation:fall${i} ${1.5+Math.random()*1.5}s ${Math.random()*.8}s ease-in forwards;`;
    ov.appendChild(d);
    const st=document.createElement('style');
    st.textContent=`@keyframes fall${i}{to{top:110%;transform:rotate(${Math.random()*720}deg);}}`;
    ov.appendChild(st);
  }
}

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

switchMode('write');
</script>
